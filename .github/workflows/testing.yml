name: Testing

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ["8.2", "8.4"]
    services:
      database:
        image: mysql:latest
        env:
          MYSQL_DATABASE: wordpress_tests
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: phpunit-polyfills:1.1

      - name: Setup tests
        run: bash bin/gh-install-wp-tests.sh wordpress_tests root root 127.0.0.1 latest true

      - name: Run tests
        run: phpunit

  # Deploy HTML coverage to GitHub Pages after tests pass on main
  deploy-coverage:
    name: Deploy HTML Coverage to GitHub Pages
    needs: phpunit
    runs-on: ubuntu-latest
    if: github.event.pull_request == null && github.ref == 'refs/heads/main'
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Copy html-coverage to public
        run: |
          rm -rf public || true
          cp -r html-coverage public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
